<!DOCTYPE html> 

<html>  
   <head> 
      <meta charset = "utf-8"/> 
      <title>3D Formula</title> 
      <style>
         body {
            margin: 0;
            padding: 1rem;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 1rem;
            background: #111;
            color: #eee;
            font-family: system-ui, sans-serif;
         }

         #showData {
            flex: 0 0 280px;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid #444;
            border-radius: 12px;
            padding: 1rem;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
         }

         #showData div {
            margin-bottom: 0.75rem;
            line-height: 1.4;
         }

         #showData div:last-child {
            margin-bottom: 0;
         }
      </style>
   </head> 
  
   <body>
      <canvas id="game"></canvas>
      <div id="showData">
         <div id="showDt"></div>
         <div id="showDz"></div>
         <div id="showAngle"></div>
         <div id="showFPS"></div>
         <div id="showXYZ"></div>
         <div id="showTranslateZ"></div>
         <div id="showProjectZ"></div>
      </div>
      <script src="index.js"></script>
   </body> 
</html>
